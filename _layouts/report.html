<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ page.title | default: "AI News Daily Report" }}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", sans-serif;
    line-height: 1.7;
    color: #1a1a1a;
    background: #fafafa;
    padding: 16px;
    max-width: 800px;
    margin: 0 auto;
  }
  h1 { font-size: 1.4em; margin: 16px 0 8px; border-bottom: 2px solid #2563eb; padding-bottom: 4px; }
  h2 { font-size: 1.2em; margin: 20px 0 8px; color: #2563eb; }
  h3 { font-size: 1.05em; margin: 16px 0 6px; }
  p { margin: 6px 0; }
  a { color: #2563eb; text-decoration: none; word-break: break-all; }
  a:hover { text-decoration: underline; }
  ul, ol { padding-left: 1.5em; margin: 6px 0; }
  li { margin: 3px 0; }
  hr { border: none; border-top: 1px solid #ddd; margin: 16px 0; }
  table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 0.9em; }
  th, td { border: 1px solid #ddd; padding: 6px 8px; text-align: left; }
  th { background: #f0f0f0; }
  code { background: #f0f0f0; padding: 1px 4px; border-radius: 3px; font-size: 0.9em; }
  blockquote { border-left: 3px solid #2563eb; padding-left: 12px; color: #555; margin: 8px 0; }
  .nav { text-align: center; padding: 12px 0; font-size: 0.9em; }
  .nav a { margin: 0 8px; }
  strong { color: #1a1a1a; }
</style>
</head>
<body>
<div class="nav">
  <a href="{{ site.baseurl }}/">TOP</a>
</div>

{{ content }}

<div class="nav">
  <a href="{{ site.baseurl }}/">TOP</a>
</div>
</body>
</html>
